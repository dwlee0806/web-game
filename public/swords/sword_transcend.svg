<svg xmlns="http://www.w3.org/2000/svg" width="120" height="220" viewBox="0 0 120 220">
  <defs>
    <linearGradient id="blade-transcend" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC407A" stop-opacity="0.35"/>
      <stop offset="20%" stop-color="#E8ECF0" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="55%" stop-color="#F0F4F8" stop-opacity="0.9"/>
      <stop offset="75%" stop-color="#D0D8E0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#EC407A" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="guard-transcend" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EC407A"/>
      <stop offset="30%" stop-color="#FFFBE6" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#EC407A"/>
      <stop offset="100%" stop-color="#F48FB1" stop-opacity="0.7"/>
