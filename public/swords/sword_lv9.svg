<svg xmlns="http://www.w3.org/2000/svg" width="120" height="220" viewBox="0 0 120 220">
  <defs>
    <linearGradient id="blade-legendary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF7043" stop-opacity="0.35"/>
      <stop offset="20%" stop-color="#E8ECF0" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="55%" stop-color="#F0F4F8" stop-opacity="0.9"/>
      <stop offset="75%" stop-color="#D0D8E0" stop-opacity="0.8"/>
